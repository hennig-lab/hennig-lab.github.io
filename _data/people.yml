grad_students:
- name: "Rachel Utama"
  image_path: "rachel-utama.jpeg"
  bio: "Rachel is a PhD student in the Quantitative and Computational Biosciences program at BCM. Her current research integrates experimental and computational approaches to understand the computations underlying healthy cognition, with the goal of informing therapies for neurological and neuropsychiatric conditions. In her free time, Rachel enjoys traveling, creative writing, getting outdoors, and perfecting her Ninja Creami creations."
  bio_long: "Rachel is a PhD student in the Quantitative and Computational Biosciences program at Baylor College of Medicine. She graduated from Northeastern University in Boston with a B.S. in Data Science and Behavioral Neuroscience in 2025. As an undergraduate, she worked in biotech on both the research and business sides of therapeutics for neurodegenerative diseases. Her current research integrates experimental and computational approaches to understand the computations underlying healthy cognition, with the goal of informing therapies for neurological and neuropsychiatric conditions. In her free time, Rachel enjoys traveling, creative writing, getting outdoors, and perfecting her Ninja Creami creations."
  type: "PhD student"
  url: ""
